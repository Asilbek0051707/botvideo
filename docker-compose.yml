# =============================================================================
# AI YouTube Factory — local / single-host stack
#   docker compose up --build
# GPU rendering overlay:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml up
# Production (adds nginx): docker compose --profile prod up -d
# =============================================================================

x-app-env: &app-env
  env_file: .env

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-factory}
      POSTGRES_DB: ${POSTGRES_DB:-factory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-factory} -d ${POSTGRES_DB:-factory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket on first boot, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET:-factory} &&
      mc anonymous set download local/${STORAGE_BUCKET:-factory} &&
      echo 'bucket ready';
      "

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    <<: *app-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    <<: *app-env
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app.celery", "worker", "-Q", "default,render,gpu", "-l", "info", "--concurrency=2"]
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    <<: *app-env
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app.celery", "beat", "-l", "info"]
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: worker/Dockerfile
    <<: *app-env
    restart: unless-stopped
    command: ["celery", "-A", "worker.celery_app.celery", "flower", "--port=5555", "--basic_auth=${FLOWER_BASIC_AUTH:-admin:admin}"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  telegram:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    <<: *app-env
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro

volumes:
  pgdata:
  redisdata:
  miniodata:
