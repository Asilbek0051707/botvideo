# Render.com Blueprint — provisions the whole stack in one push.
# See: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: factory-api
    runtime: docker
    plan: standard
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: factory-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: API_KEYS
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
    healthCheckPath: /api/health

  - type: worker
    name: factory-worker
    runtime: docker
    plan: standard
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    dockerCommand: celery -A worker.celery_app.celery worker -Q default,render -l info --concurrency=2
    envVars:
      - fromGroup: factory-shared
      - key: DATABASE_URL
        fromDatabase: { name: factory-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: factory-redis, property: connectionString }

  - type: worker
    name: factory-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    dockerCommand: celery -A worker.celery_app.celery beat -l info
    envVars:
      - fromGroup: factory-shared
      - key: REDIS_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_RESULT_BACKEND
        fromService: { type: redis, name: factory-redis, property: connectionString }

  - type: worker
    name: factory-telegram
    runtime: docker
    plan: starter
    dockerfilePath: ./telegram_bot/Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: factory-shared
      - key: DATABASE_URL
        fromDatabase: { name: factory-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: CELERY_BROKER_URL
        fromService: { type: redis, name: factory-redis, property: connectionString }
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false

  - type: redis
    name: factory-redis
    plan: starter
    ipAllowList: []

databases:
  - name: factory-postgres
    plan: starter

envVarGroups:
  - name: factory-shared
    envVars:
      - key: ENV
        value: production
      - key: STORAGE_BACKEND
        value: supabase
      - key: T2V_PROVIDER
        value: replicate    # GPU workers run on RunPod/Vast, not Render
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
