user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    client_max_body_size 256m;  # we receive uploads via signed-URL flow, not direct, but be lenient

    log_format json escape=json
      '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
      '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
      '"rt":$request_time,"ua":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json;

    include /etc/nginx/conf.d/*.conf;
}
