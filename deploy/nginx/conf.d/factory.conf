# Replace `your-domain.example` with your real domain before reloading nginx.
# Certs are issued by certbot into ./deploy/certbot/conf (mounted at /etc/letsencrypt).

upstream factory_api    { server backend:8000; keepalive 32; }
upstream factory_flower { server flower:5555;  keepalive 16; }

# --- HTTP: ACME challenge + redirect to HTTPS ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: API + docs + flower -----------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API + OpenAPI docs
    location / {
        proxy_pass         http://factory_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Celery monitor (Flower has its own basic auth)
    location /flower/ {
        proxy_pass         http://factory_flower/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
